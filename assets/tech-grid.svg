    <rect x="530" y="276" width="440" height="124" rx="5" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="1"/>

    <rect x="530" y="276" width="440" height="30" rx="5" fill="#101010"/>
    <rect x="530" y="302" width="440" height="4" fill="#0A0A0A"/>
