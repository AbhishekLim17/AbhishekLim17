  <!-- connecting data flow particles -->
  <circle r="2" fill="#FF7A00">
    <animateMotion dur="5s" repeatCount="indefinite" path="M30,156 L510,156 L510,336 L30,336 L30,476 L510,476"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#FF7A00">
    <animateMotion dur="4.5s" repeatCount="indefinite" begin="1.5s" path="M530,156 L970,156 L970,336 L530,336 L530,476 L970,476"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="4.5s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
</svg>
