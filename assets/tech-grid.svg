      <text x="94" y="17" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFFFFF">Session / Conv. Storage</text>
    </g>
  </g>

  <!-- Tooling -->
  <g>
    <rect x="530" y="420" width="440" height="104" rx="5" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="1"/>

    <rect x="530" y="420" width="440" height="30" rx="5" fill="#101010"/>
    <rect x="530" y="446" width="440" height="4" fill="#0A0A0A"/>
    <circle cx="550" cy="435" r="3" fill="#FF7A00">
