    <g transform="translate(550,136)">
      <rect width="164" height="26" rx="4" fill="#101010" stroke="#2A2A2A"/>
      <text x="82" y="17" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFFFFF">Serverless Functions</text>
    </g>
    <g transform="translate(724,136)">
      <rect width="118" height="26" rx="4" fill="#101010" stroke="#2A2A2A"/>
      <text x="59" y="17" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFFFFF">Express.js</text>
