<svg viewBox="0 0 1000 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Technology Ecosystem">
  <defs>
    <pattern id="techGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#141414" stroke-width="1"/>
    </pattern>
    <radialGradient id="catGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF7A00" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF7A00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1000" height="540" fill="#050505"/>
  <rect width="1000" height="540" fill="url(#techGrid)"/>

  <!-- section header -->
  <text x="30" y="36" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#8A8A8A" letter-spacing="3">TECHNOLOGY.ECOSYSTEM</text>
  <line x1="280" y1="30" x2="970" y2="30" stroke="#2A2A2A" stroke-width="1"/>

  <!-- ===== ROW 1: AI/LLM + Backend ===== -->

  <!-- AI / LLM Category -->
  <g>
    <rect x="30" y="56" width="480" height="200" rx="5" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="1"/>
    <ellipse cx="270" cy="156" rx="200" ry="80" fill="url(#catGlow)"/>

    <!-- category header -->
    <rect x="30" y="56" width="480" height="30" rx="5" fill="#101010"/>
    <rect x="30" y="82" width="480" height="4" fill="#0A0A0A"/>
    <circle cx="50" cy="71" r="3" fill="#FF7A00">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="62" y="75" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FF7A00" letter-spacing="2">AI / LLM</text>

    <!-- tech items -->
    <g transform="translate(50,100)">
      <rect width="76" height="26" rx="4" fill="#101010" stroke="#2A2A2A"/>
      <text x="38" y="17" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFFFFF">Groq</text>
    </g>
    <g transform="translate(136,100)">
      <rect width="104" height="26" rx="4" fill="#101010" stroke="#2A2A2A"/>
      <text x="52" y="17" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFFFFF">OpenAI API</text>
    </g>
    <g transform="translate(250,100)">
      <rect width="108" height="26" rx="4" fill="#101010" stroke="#2A2A2A"/>
      <text x="54" y="17" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFFFFF">Gemini API</text>
    </g>
    <g transform="translate(368,100)">
      <rect width="126" height="26" rx="4" fill="#101010" stroke="#2A2A2A"/>
      <text x="63" y="17" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFFFFF">Claude API</text>
    </g>

    <g transform="translate(50,136)">
      <rect width="156" height="26" rx="4" fill="#101010" stroke="#2A2A2A"/>
      <text x="78" y="17" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFFFFF">Prompt Engineering</text>
    </g>
    <g transform="translate(216,136)">
      <rect width="138" height="26" rx="4" fill="#101010" stroke="#2A2A2A"/>
      <text x="69" y="17" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFFFFF">LLM Routing</text>
