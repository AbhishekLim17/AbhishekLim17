      <text x="39" y="17" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFFFFF">Cursor</text>
    </g>
    <g transform="translate(834,464)">
      <rect width="106" height="26" rx="4" fill="#101010" stroke="#2A2A2A"/>
      <text x="53" y="17" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFFFFF">Windsurf</text>
