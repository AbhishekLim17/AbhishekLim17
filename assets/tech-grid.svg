      <text x="48" y="17" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFFFFF">Supabase</text>
    </g>
    <g transform="translate(156,464)">
      <rect width="112" height="26" rx="4" fill="#101010" stroke="#2A2A2A"/>
      <text x="56" y="17" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFFFFF">PostgreSQL</text>
