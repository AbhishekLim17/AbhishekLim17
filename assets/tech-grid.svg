      <text x="67" y="17" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFFFFF">GitHub Actions</text>
    </g>

    <g transform="translate(550,356)">
      <rect width="138" height="26" rx="4" fill="#101010" stroke="#2A2A2A"/>
      <text x="69" y="17" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFFFFF">Custom Domains</text>
