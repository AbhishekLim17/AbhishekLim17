    <g transform="translate(246,320)">
      <rect width="84" height="26" rx="4" fill="#101010" stroke="#2A2A2A"/>
      <text x="42" y="17" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFFFFF">Next.js</text>
