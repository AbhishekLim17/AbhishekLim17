<svg viewBox="0 0 1000 140" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="footer">
  <defs>
    <pattern id="footerGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#141414" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1000" height="140" fill="#050505"/>
  <rect width="1000" height="140" fill="url(#footerGrid)"/>
  <line x1="0" y1="0" x2="1000" y2="0" stroke="#2A2A2A" stroke-width="1"/>

  <g transform="translate(500,54)">
    <circle r="3" fill="#FF7A00">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="14" y="4" font-family="'JetBrains Mono', monospace" font-size="12" fill="#8A8A8A" letter-spacing="2">RUNTIME ACTIVE</text>
  </g>

  <text x="500" y="90" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" fill="#FFFFFF" letter-spacing="1">Designed, built, and maintained by Abhishek Limbachiya</text>
  <text x="500" y="112" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8A8A8A">github.com/AbhishekLim17</text>
</svg>
