<svg viewBox="0 0 1000 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Currently Engineering: AI Agents, Multi-Model Systems, LLM Engineering, Agentic Workflows, AI Automation, Enterprise Chatbots, AI SaaS Platforms, Backend Infrastructure">
  <defs>
    <pattern id="engGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#141414" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1000" height="280" fill="#050505"/>
  <rect width="1000" height="280" fill="url(#engGrid)"/>

  <!-- section header -->
  <text x="30" y="30" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#8A8A8A" letter-spacing="3">CURRENTLY.ENGINEERING</text>
  <line x1="290" y1="24" x2="970" y2="24" stroke="#2A2A2A" stroke-width="1"/>

  <!-- description -->
  <text x="30" y="62" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#8A8A8A">Building production-ready AI systems that combine LLMs, AI Agents, automation and scalable backend architecture.</text>

  <!-- sub-header -->
  <text x="30" y="102" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#FF7A00" letter-spacing="2">ACTIVE FOCUS</text>
  <line x1="140" y1="96" x2="280" y2="96" stroke="#2A2A2A" stroke-width="1"/>

  <!-- ===== ROW 1 ===== -->

  <!-- Card 1: AI Agents -->
  <g>
    <rect x="30" y="122" width="220" height="50" rx="4" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="1"/>
    <rect x="30" y="122" width="3" height="50" rx="1" fill="#FF7A00"/>
    <circle cx="50" cy="147" r="3" fill="#FF7A00">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="64" y="151" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#FFFFFF">AI Agents</text>
  </g>

  <!-- Card 2: Multi-Model Systems -->
  <g>
    <rect x="270" y="122" width="220" height="50" rx="4" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="1"/>
    <rect x="270" y="122" width="3" height="50" rx="1" fill="#FF7A00"/>
    <circle cx="290" cy="147" r="3" fill="#FF7A00">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <text x="304" y="151" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#FFFFFF">Multi-Model Systems</text>
  </g>

  <!-- Card 3: LLM Engineering -->
  <g>
    <rect x="510" y="122" width="220" height="50" rx="4" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="1"/>
    <rect x="510" y="122" width="3" height="50" rx="1" fill="#FF7A00"/>
    <circle cx="530" cy="147" r="3" fill="#FF7A00">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <text x="544" y="151" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#FFFFFF">LLM Engineering</text>
  </g>

  <!-- Card 4: Agentic Workflows -->
  <g>
    <rect x="750" y="122" width="220" height="50" rx="4" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="1"/>
    <rect x="750" y="122" width="3" height="50" rx="1" fill="#FF7A00"/>
    <circle cx="770" cy="147" r="3" fill="#FF7A00">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite" begin="0.9s"/>
    </circle>
    <text x="784" y="151" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#FFFFFF">Agentic Workflows</text>
  </g>

  <!-- ===== ROW 2 ===== -->

  <!-- Card 5: AI Automation -->
  <g>
    <rect x="30" y="192" width="220" height="50" rx="4" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="1"/>
    <rect x="30" y="192" width="3" height="50" rx="1" fill="#FF7A00"/>
    <circle cx="50" cy="217" r="3" fill="#FF7A00">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.1s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    <text x="64" y="221" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#FFFFFF">AI Automation</text>
  </g>

  <!-- Card 6: Enterprise Chatbots -->
  <g>
    <rect x="270" y="192" width="220" height="50" rx="4" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="1"/>
    <rect x="270" y="192" width="3" height="50" rx="1" fill="#FF7A00"/>
    <circle cx="290" cy="217" r="3" fill="#FF7A00">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.9s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <text x="304" y="221" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#FFFFFF">Enterprise Chatbots</text>
  </g>

  <!-- Card 7: AI SaaS Platforms -->
  <g>
    <rect x="510" y="192" width="220" height="50" rx="4" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="1"/>
    <rect x="510" y="192" width="3" height="50" rx="1" fill="#FF7A00"/>
    <circle cx="530" cy="217" r="3" fill="#FF7A00">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.3s" repeatCount="indefinite" begin="1.8s"/>
    </circle>
    <text x="544" y="221" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#FFFFFF">AI SaaS Platforms</text>
  </g>

  <!-- Card 8: Backend Infrastructure -->
  <g>
    <rect x="750" y="192" width="220" height="50" rx="4" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="1"/>
    <rect x="750" y="192" width="3" height="50" rx="1" fill="#FF7A00"/>
    <circle cx="770" cy="217" r="3" fill="#FF7A00">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.6s" repeatCount="indefinite" begin="2.1s"/>
    </circle>
    <text x="784" y="221" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#FFFFFF">Backend Infrastructure</text>
  </g>

  <!-- data flow particle connecting the rows -->
  <circle r="2" fill="#FF7A00">
    <animateMotion dur="4s" repeatCount="indefinite" path="M30,147 L250,147 L270,147 L490,147 L510,147 L730,147 L750,147 L970,147 L970,217 L750,217 L510,217 L270,217 L30,217"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- corner accents -->
  <g stroke="#FF7A00" stroke-width="1.5" fill="none">
    <path d="M 0 14 L 0 0 L 14 0"/>
    <path d="M 986 0 L 1000 0 L 1000 14"/>
    <path d="M 1000 266 L 1000 280 L 986 280"/>
    <path d="M 14 280 L 0 280 L 0 266"/>
  </g>
</svg>
